# Azure ML Component: Model Evaluation (Manual Track)
# Register with: az ml component create -f components/evaluate.yaml --workspace-name mlops-churn-ws --resource-group mlops-churn-rg

$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: telco_evaluate
display_name: "Telco Churn — Model Evaluation"
description: "Compare candidate model vs production model on test set. Promote if AUC improves by > 1%."
version: "5"

inputs:
  splits_dir:
    type: uri_folder
    description: "Folder containing test.parquet"

  model_dir:
    type: uri_folder
    description: "Folder containing model.json written by train step"

  registered_model_name:
    type: string
    default: "telco-churn-xgboost"

outputs:
  eval_report:
    type: uri_folder
    description: "evaluation_report.json — includes metrics and promote flag"

code: ../src/evaluation

environment: azureml:telco-churn-env:3

command: >-
  python evaluate.py
  --splits-dir ${{inputs.splits_dir}}
  --model-dir ${{inputs.model_dir}}
  --registered-model-name ${{inputs.registered_model_name}}
  --output-dir ${{outputs.eval_report}}
