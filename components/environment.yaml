# Azure ML Environment definition — shared by all pipeline components
# Register with: az ml environment create -f components/environment.yaml --workspace-name mlops-churn-ws --resource-group mlops-churn-rg

$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json

name: telco-churn-env
version: "3"
description: "Python 3.10 environment for Telco Churn MLOps project"

# Base image: Microsoft-maintained Python 3.10 AzureML image
image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest

conda_file:
  name: telco-churn
  channels:
    - defaults
    - conda-forge
  dependencies:
    - python=3.10
    - pip
    - pip:
        - azure-ai-ml
        - azure-identity
        - mlflow
        - azureml-mlflow
        - scikit-learn
        - xgboost
        - lightgbm
        - pandas
        - numpy
        - pyarrow
        - joblib
        - matplotlib
        - pyyaml
        - requests
