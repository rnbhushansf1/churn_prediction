# Azure ML Component: Model Evaluation (AutoML Track)
# Register with: az ml component create -f components/evaluate_automl.yaml --workspace-name mlops-churn-ws --resource-group mlops-churn-rg

$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: telco_evaluate_automl
display_name: "Telco Churn — AutoML Model Evaluation"
description: "Evaluate best AutoML model on test set, register with 'candidate' tag, promote if AUC > production"
version: "4"

inputs:
  splits_dir:
    type: uri_folder
    description: "Folder containing test.parquet"

  automl_model_path:
    type: mlflow_model
    description: "Best model artifact output from the AutoML step"

  registered_model_name:
    type: string
    default: "telco-churn-automl"

outputs:
  eval_report:
    type: uri_folder
    description: "evaluation_report.json"

code: ../src/evaluation

environment: azureml:telco-churn-env:3

command: >-
  python evaluate_automl.py
  --splits-dir ${{inputs.splits_dir}}
  --automl-model-path ${{inputs.automl_model_path}}
  --registered-model-name ${{inputs.registered_model_name}}
  --output-dir ${{outputs.eval_report}}
