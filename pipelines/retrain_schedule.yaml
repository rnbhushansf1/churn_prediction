# Azure ML Schedule: Daily retraining at 02:00 UTC
# Register with:
#   az ml schedule create -f pipelines/retrain_schedule.yaml --workspace-name mlops-churn-ws --resource-group mlops-churn-rg
# Disable with:
#   az ml schedule disable --name daily-churn-retrain --workspace-name mlops-churn-ws --resource-group mlops-churn-rg

$schema: https://azuremlschemas.azureedge.net/latest/schedule.schema.json
name: daily-churn-retrain
display_name: "Daily Churn Retraining"
description: "Retrain XGBoost churn model daily at 02:00 UTC, promote if AUC improves by >1%"

trigger:
  type: cron
  expression: "0 2 * * *"
  start_time: "2026-04-19T02:00:00"
  time_zone: UTC

create_job:
  type: pipeline
  display_name: "Telco Churn — Retraining Pipeline"
  experiment_name: telco-churn-retrain
  settings:
    default_compute: azureml:cpu-cluster
    default_datastore: azureml:workspaceblobstore
    continue_on_step_failure: false
  inputs:
    raw_data:
      type: uri_file
      path: azureml:telco-churn-raw:1
  jobs:
    ingest:
      type: command
      component: azureml:telco_ingest:3
      inputs:
        input_csv: ${{parent.inputs.raw_data}}
      outputs:
        output_parquet:
          type: uri_folder
          mode: rw_mount
    preprocess:
      type: command
      component: azureml:telco_preprocess:3
      inputs:
        input_parquet: ${{parent.jobs.ingest.outputs.output_parquet}}
      outputs:
        splits_dir:
          type: uri_folder
          mode: rw_mount
        artifacts_dir:
          type: uri_folder
          mode: rw_mount
    train:
      type: command
      component: azureml:telco_train_manual:4
      inputs:
        splits_dir: ${{parent.jobs.preprocess.outputs.splits_dir}}
        registered_model_name: "telco-churn-xgboost"
      outputs:
        model_dir:
          type: uri_folder
          mode: rw_mount
    evaluate:
      type: command
      component: azureml:telco_evaluate:5
      inputs:
        splits_dir: ${{parent.jobs.preprocess.outputs.splits_dir}}
        model_dir: ${{parent.jobs.train.outputs.model_dir}}
        registered_model_name: "telco-churn-xgboost"
      outputs:
        eval_report:
          type: uri_folder
          mode: rw_mount
