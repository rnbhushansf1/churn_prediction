# Azure ML Pipeline: AutoML Track
# Runs ingestion → preprocessing → AutoML training → evaluation
# Submit with: az ml job create -f pipelines/automl_pipeline.yaml --workspace-name mlops-churn-ws --resource-group mlops-churn-rg

$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline

display_name: "Telco Churn — AutoML Pipeline"
description: "End-to-end churn pipeline using Azure AutoML classification"
experiment_name: telco-churn-automl

settings:
  default_compute: azureml:cpu-cluster
  default_datastore: azureml:workspaceblobstore
  continue_on_step_failure: false

inputs:
  raw_data:
    type: uri_file
    path: azureml:telco-churn-raw:1

jobs:
  # ── Step 1: Ingest ────────────────────────────────────────────────────────
  ingest:
    type: command
    component: azureml:telco_ingest:3
    inputs:
      input_csv: ${{parent.inputs.raw_data}}
    outputs:
      output_parquet:
        type: uri_folder
        mode: rw_mount

  # ── Step 2: Preprocess (writes parquet + MLTable dirs for AutoML) ─────────
  preprocess:
    type: command
    component: azureml:telco_preprocess:4
    inputs:
      input_parquet: ${{parent.jobs.ingest.outputs.output_parquet}}
    outputs:
      splits_dir:
        type: uri_folder
        mode: rw_mount
      artifacts_dir:
        type: uri_folder
        mode: rw_mount
      train_mltable_dir:
        type: mltable
        mode: rw_mount
      val_mltable_dir:
        type: mltable
        mode: rw_mount

  # ── Step 3: AutoML classification ─────────────────────────────────────────
  automl_train:
    type: automl
    task: classification
    primary_metric: AUC_weighted
    target_column_name: Churn
    training_data: ${{parent.jobs.preprocess.outputs.train_mltable_dir}}
    validation_data: ${{parent.jobs.preprocess.outputs.val_mltable_dir}}
    compute: azureml:cpu-cluster
    limits:
      max_trials: 5
      timeout_minutes: 30
      max_concurrent_trials: 2
      trial_timeout_minutes: 15
      enable_early_termination: true
    training:
      allowed_training_algorithms:
        - LogisticRegression
        - RandomForest
        - GradientBoosting
        - LightGBM
        - XGBoostClassifier
      enable_stack_ensemble: false
      enable_vote_ensemble: false
    featurization:
      mode: auto
    outputs:
      best_model:
        type: mlflow_model

  # ── Step 4: Evaluate & register best AutoML model ─────────────────────────
  evaluate:
    type: command
    component: azureml:telco_evaluate_automl:4
    inputs:
      splits_dir:            ${{parent.jobs.preprocess.outputs.splits_dir}}
      automl_model_path:     ${{parent.jobs.automl_train.outputs.best_model}}
      registered_model_name: "telco-churn-automl"
    outputs:
      eval_report:
        type: uri_folder
        mode: rw_mount
